version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rlhf
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d rlhf" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - app-network

  sandbox:
    build: ./sandbox
    ports:
      - "8001:8001"
    # No DB access — intentionally isolated
    networks:
      - app-network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/rlhf
      SANDBOX_URL: http://sandbox:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_started
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - app-network

  airflow-webserver:
    build: ./airflow
    command: webserver
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:password@db:5432/rlhf
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      DATABASE_URL: postgresql://user:password@db:5432/rlhf
      BACKEND_URL: http://backend:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  airflow-scheduler:
    build: ./airflow
    command: scheduler
    environment: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  airflow-init:
    build: ./airflow
    environment: *airflow-common-env
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password admin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
