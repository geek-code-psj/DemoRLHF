services:
  - name: backend
    type: web
    env: python
    region: oregon
    rootDir: ./backend
    buildFilter:
      paths:
        - "backend/**"
    buildCommand: "pip install -r requirements.txt"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Neon connection string in the Render dashboard
      - key: SANDBOX_URL
        value: http://sandbox:8001
      - key: NEON_API_KEY
        sync: false # Not strictly needed for deployment, but good practice

  - name: sandbox
    type: web
    env: docker
    region: oregon
    rootDir: ./sandbox
    buildFilter:
      paths:
        - "sandbox/**"
    dockerfilePath: ./sandbox/Dockerfile
    envVars:
      - key: PORT
        value: 8001
